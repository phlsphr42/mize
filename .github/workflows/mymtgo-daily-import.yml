name: mymtgo Daily Import

on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to import (YYYY-MM-DD). Leave blank for all available data.'
        required: false

jobs:
  import:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://vkgtqunhsalquihlqkxp.supabase.co
      SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      MYMTGO_API_KEY: ${{ secrets.MYMTGO_API_KEY }}
      MYMTGO_ENDPOINT: https://mymtgo.com/api/card-stats/hands

    steps:
      - name: Fetch games from mymtgo
        run: |
          echo "Fetching games from mymtgo..."
          curl -s -f \
            -H "Authorization: Bearer $MYMTGO_API_KEY" \
            -H "Accept: application/json" \
            "$MYMTGO_ENDPOINT" \
            -o games_raw.json
          echo "Fetch complete"
          wc -c games_raw.json

      - name: Wrap and send to Mize
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request, urllib.error

          with open('games_raw.json') as f:
              data = json.load(f)

          if isinstance(data, list):
              payload = {'games': data}
          elif 'games' in data:
              payload = data
          else:
              payload = {'games': [data]}

          print(f"Game count: {len(payload['games'])}")

          body = json.dumps(payload).encode('utf-8')
          req = urllib.request.Request(
              os.environ['SUPABASE_URL'] + '/rest/v1/rpc/import_mymtgo_games',
              data=body,
              headers={
                  'Content-Type': 'application/json',
                  'apikey': os.environ['SUPABASE_KEY'],
                  'Authorization': 'Bearer ' + os.environ['SUPABASE_KEY'],
              },
              method='POST'
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
                  imported = result.get('imported', 0)
                  skipped = result.get('skipped', 0)
                  errors = result.get('errors', 0)
                  print(f"Imported: {imported} | Skipped: {skipped} | Errors: {errors}")
                  if errors > 0:
                      for e in result.get('error_details', [])[:10]:
                          print(f"  ERROR: {e}")
          except urllib.error.HTTPError as e:
              print(f"HTTP Error: {e.code} {e.reason}")
              print(e.read().decode())
              raise
          PYEOF
