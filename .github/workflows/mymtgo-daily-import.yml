name: mymtgo Daily Import

on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to import (YYYY-MM-DD). Leave blank for all available data.'
        required: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and import games from mymtgo
        env:
          SUPABASE_URL: https://vkgtqunhsalquihlqkxp.supabase.co
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MYMTGO_API_KEY: ${{ secrets.MYMTGO_API_KEY }}
          MYMTGO_ENDPOINT: https://mymtgo.com/api/card-stats/hands
        run: |
          echo "Fetching games from mymtgo..."

          GAMES=$(curl -s -f \
            -H "Authorization: Bearer $MYMTGO_API_KEY" \
            -H "Accept: application/json" \
            "${MYMTGO_ENDPOINT}")

          if [ $? -ne 0 ]; then
            echo "ERROR: Failed to fetch games from mymtgo"
            exit 1
          fi

          GAME_COUNT=$(echo $GAMES | python3 -c "
import sys, json
data = json.load(sys.stdin)
print(len(data) if isinstance(data, list) else len(data.get('games', [])))
")
          echo "Fetched $GAME_COUNT games from mymtgo"

          # Wrap bare array in { "games": [...] } for Mize import function
          PAYLOAD=$(echo $GAMES | python3 -c "
import sys, json
data = json.load(sys.stdin)
if isinstance(data, list):
    print(json.dumps({'games': data}))
elif 'games' in data:
    print(json.dumps(data))
else:
    print(json.dumps({'games': [data]}))
")

          echo "Sending to Mize..."

          RESULT=$(curl -s -f \
            -X POST \
            -H "Content-Type: application/json" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -d "$PAYLOAD" \
            "${SUPABASE_URL}/rest/v1/rpc/import_mymtgo_games")

          echo "Import result: $RESULT"

          IMPORTED=$(echo $RESULT | python3 -c "import sys,json; print(json.load(sys.stdin).get('imported', 0))")
          SKIPPED=$(echo $RESULT | python3 -c "import sys,json; print(json.load(sys.stdin).get('skipped', 0))")
          ERRORS=$(echo $RESULT | python3 -c "import sys,json; print(json.load(sys.stdin).get('errors', 0))")

          echo "✓ Imported: $IMPORTED | Skipped (duplicates): $SKIPPED | Errors: $ERRORS"

          if [ "$ERRORS" -gt "0" ]; then
            echo "WARNING: $ERRORS records failed to import"
            echo $RESULT | python3 -c "
import sys, json
details = json.load(sys.stdin).get('error_details', [])
for d in details[:10]:
    print(d)
"
          fi
