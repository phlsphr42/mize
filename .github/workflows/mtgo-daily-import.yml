name: MTGO Daily Import

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  import:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run MTGO import
        id: import
        env:
          SUPABASE_URL: https://vkgtqunhsalquihlqkxp.supabase.co
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.MTGO_GITHUB_TOKEN }}
        run: |
          python scripts/mtgo_import.py 2>&1 | tee import_output.txt
          if grep -q 'ARCHETYPE CORRECTIONS APPLIED' import_output.txt; then
            echo "has_corrections=true" >> $GITHUB_OUTPUT
          else
            echo "has_corrections=false" >> $GITHUB_OUTPUT
          fi

      - name: Notify on archetype corrections
        if: steps.import.outputs.has_corrections == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('import_output.txt', 'utf8');
            const correctionSection = output.split('ARCHETYPE CORRECTIONS APPLIED:')[1] || '';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠ Archetype corrections applied — ${new Date().toISOString().slice(0,10)}`,
              body: `The MTGO daily import detected and corrected archetype mismatches.\n\n\`\`\`\n${correctionSection.slice(0, 3000)}\n\`\`\`\n\n[View full run log](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['archetype-correction']
            });
