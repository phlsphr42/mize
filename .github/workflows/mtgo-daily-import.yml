name: MTGO Daily Import

on:
  schedule:
    # Runs at 18:00 UTC daily (after fbettega updates at ~17:00 UTC)
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      full_import:
        description: 'Run full historical import (ignores 1-year lookback window)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      lookback_days:
        description: 'Number of days to look back (default: 365)'
        required: false
        default: '365'

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run MTGO import
        id: import
        env:
          SUPABASE_URL: https://vkgtqunhsalquihlqkxp.supabase.co
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.MTGO_GITHUB_TOKEN }}
        run: |
          set -o pipefail
          if [ "${{ github.event.inputs.full_import }}" = "true" ]; then
            echo "Running full historical import..."
            python scripts/mtgo_import.py --full 2>&1 | tee import_output.txt
          else
            DAYS="${{ github.event.inputs.lookback_days }}"
            DAYS="${DAYS:-365}"
            echo "Running import with ${DAYS}-day lookback window..."
            python scripts/mtgo_import.py --lookback-days "${DAYS}" 2>&1 | tee import_output.txt
          fi
          CORRECTIONS=$(grep -c 'ARCHETYPE CORRECTIONS APPLIED' import_output.txt || true)
          CORRECTIONS=${CORRECTIONS:-0}
          echo "corrections=${CORRECTIONS}" >> $GITHUB_OUTPUT

      - name: Notify on archetype corrections
        if: contains(steps.import.outputs.corrections, '1') || contains(steps.import.outputs.corrections, '2') || contains(steps.import.outputs.corrections, '3') || contains(steps.import.outputs.corrections, '4') || contains(steps.import.outputs.corrections, '5')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('import_output.txt', 'utf8');
            const correctionSection = output.split('ARCHETYPE CORRECTIONS APPLIED:')[1] || '';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠ Archetype corrections applied — ${new Date().toISOString().slice(0,10)}`,
              body: `The MTGO daily import detected and corrected archetype mismatches.\n\n\`\`\`\n${correctionSection.slice(0, 3000)}\n\`\`\`\n\n[View full run log](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['archetype-correction']
            });
